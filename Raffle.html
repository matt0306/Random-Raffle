<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MX Division Raffle System</title>
    <style>
        :root {
            --bg: #0a0f1e;
            --panel: #161e31;
            --accent: #00f2ff;
            --text: #ffffff;
        }
        body {
            margin: 0; padding: 20px; font-family: 'Malgun Gothic', sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; height: 100vh; gap: 20px; box-sizing: border-box;
        }
        .sidebar {
            width: 320px; background: var(--panel); padding: 20px;
            border-radius: 12px; border: 1px solid var(--accent);
            display: flex; flex-direction: column; gap: 15px; box-shadow: 0 0 15px rgba(0,242,255,0.1);
        }
        .main {
            flex: 1; background: var(--panel); border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; overflow: hidden; border: 1px solid #2d3748;
        }
        textarea, input {
            width: 100%; background: #0a0f1e; color: white; border: 1px solid #4a5568;
            padding: 10px; border-radius: 6px; box-sizing: border-box; font-size: 14px;
        }
        button {
            width: 100%; padding: 12px; cursor: pointer; border-radius: 6px;
            font-weight: bold; background: transparent; color: var(--accent);
            border: 1px solid var(--accent); transition: 0.2s; font-size: 15px;
        }
        button:hover { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent); }
        #poolDisplay { font-size: 28px; color: var(--accent); font-weight: bold; text-align: center; margin: 10px 0; }
        .modal {
            position: absolute; inset: 0; background: rgba(10, 15, 30, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--accent); margin: 0; text-align: center; letter-spacing: 2px;">MX RAFFLE v2.0</h2>
       
        <label style="font-size: 13px; color: #94a3b8;">1. 참가자 명단 입력 (한 줄에 한 명)</label>
        <textarea id="nameInput" rows="10" placeholder="이범준&#10;홍길동&#10;권나라"></textarea>
       
        <button type="button" id="btnUpdateData">데이터 갱신</button>
       
        <div id="poolDisplay">0 명</div>
       
        <hr style="width:100%; border: 0; border-top: 1px solid #2d3748;">
       
        <label style="font-size: 13px; color: #94a3b8;">2. 상품 및 인원 설정</label>
        <input type="text" id="prizeTitle" placeholder="상품명 (예: 갤럭시 워치)">
        <div style="display: flex; align-items: center; gap: 10px;">
            <input type="number" id="prizeQty" value="1" min="1">
            <span style="white-space: nowrap; font-size: 14px;">명 추첨</span>
        </div>
       
        <button type="button" id="btnPrepareDraw" style="background: rgba(0,242,255,0.1); border-width: 2px;">추첨 화면 준비</button>
       
        <button type="button" id="btnExportCSV" style="margin-top: auto; border-color: #48bb78; color: #48bb78;">최종 결과 CSV 저장</button>
    </div>

    <div class="main" id="drawArea">
        <div style="color: #718096; text-align: center;">
            <p style="font-size: 60px; margin: 0;">🎲</p>
            <p style="font-size: 18px;">좌측 패널에 명단을 넣고<br><b>[데이터 갱신]</b>을 눌러주세요.</p>
        </div>
    </div>

    <div class="modal" id="resultModal">
        <h1 id="winnerAnnounce" style="color: #f6e05e; font-size: 3.5em; margin-bottom: 10px; text-shadow: 0 0 20px rgba(246,224,94,0.4);">CONGRATS!</h1>
        <div id="winnerNames" style="font-size: 2em; margin-bottom: 40px; text-align: center; color: white; font-weight: bold;"></div>
        <button type="button" id="btnCloseModal" style="width: auto; padding: 15px 60px; font-size: 20px;">확인 및 다음 추첨</button>
    </div>

    <script>
        console.log("Raffle Program Loaded Successfully! (보안 우회 모드)");

        let participants = [];
        let finalWinners = [];

        // 1. 데이터 갱신 이벤트 등록
        document.getElementById('btnUpdateData').addEventListener('click', function() {
            const raw = document.getElementById('nameInput').value.trim();
            if (!raw) {
                alert("명단을 입력해주세요.");
                return;
            }
           
            const lines = raw.split('\n');
            participants = lines.map((line, i) => {
                const name = line.trim();
                return { id: 'user_' + i + '_' + Math.random().toString(36).substr(2, 4), name: name };
            }).filter(p => p.name !== "");

            document.getElementById('poolDisplay').innerText = participants.length + " 명";
            alert(participants.length + "명의 명단이 성공적으로 로드되었습니다.");
        });

        // 2. 추첨 준비 이벤트 등록
        document.getElementById('btnPrepareDraw').addEventListener('click', function() {
            const qty = parseInt(document.getElementById('prizeQty').value);
            const prize = document.getElementById('prizeTitle').value;
           
            if (participants.length < qty) {
                alert("현재 남은 인원보다 뽑으려는 인원이 더 많습니다.");
                return;
            }
            if (!prize) {
                alert("상품명을 입력해주세요.");
                return;
            }

            const drawArea = document.getElementById('drawArea');
            drawArea.innerHTML = `
                <div style="text-align:center;">
                    <h2 style="color: var(--accent); font-size: 32px; margin-bottom: 10px;">${prize}</h2>
                    <p style="color: #718096; margin-bottom: 40px;">총 ${qty}명의 당첨자를 뽑습니다.</p>
                    <div id="visualizer" style="font-size: 3em; font-weight: bold; color: white; min-height: 80px; text-shadow: 0 0 10px var(--accent);">
                        준비 완료
                    </div>
                    <button type="button" id="btnStartDraw" style="width: 280px; padding: 20px; font-size: 24px; margin-top: 50px; border-radius: 50px; cursor: pointer;">추첨 시작</button>
                </div>
            `;

            // 새로 만들어진 '추첨 시작' 버튼에 이벤트 즉시 등록
            document.getElementById('btnStartDraw').addEventListener('click', function() {
                startDraw(qty, prize);
            });
        });

        // 3. 실제 추첨 애니메이션 로직
        function startDraw(qty, prize) {
            let winners = [];
            let tempPool = [...participants];

            // 당첨자 미리 선정
            for (let i = 0; i < qty; i++) {
                const randomIndex = Math.floor(Math.random() * tempPool.length);
                winners.push(tempPool[randomIndex]);
                tempPool.splice(randomIndex, 1);
            }

            const vis = document.getElementById('visualizer');
            let spinCount = 0;
            const timer = setInterval(() => {
                const randomName = participants[Math.floor(Math.random() * participants.length)].name;
                vis.innerText = randomName;
                spinCount++;
               
                if (spinCount > 20) {
                    clearInterval(timer);
                    showWinners(winners, prize);
                }
            }, 60);
        }

        // 4. 모달창 띄우기 및 데이터 처리
        function showWinners(winners, prize) {
            const modal = document.getElementById('resultModal');
            const nameArea = document.getElementById('winnerNames');
           
            nameArea.innerHTML = winners.map(w => `<div style="margin: 10px 0;">${w.name}</div>`).join('');
           
            // 중복 당첨을 방지하기 위해 전체 풀에서 당첨자 삭제
            winners.forEach(w => {
                finalWinners.push({ prize: prize, name: w.name });
                participants = participants.filter(p => p.id !== w.id);
            });
           
            document.getElementById('poolDisplay').innerText = participants.length + " 명";
            modal.style.display = 'flex';
        }

        // 5. 확인 버튼 누르면 모달 닫기
        document.getElementById('btnCloseModal').addEventListener('click', function() {
            document.getElementById('resultModal').style.display = 'none';
            document.getElementById('drawArea').innerHTML = `
                <div style="color: #718096; text-align: center;">
                    <p style="font-size: 60px; margin: 0;">🎲</p>
                    <p style="font-size: 18px;">당첨자 확정 완료!<br>다음 상품 추첨을 준비하세요.</p>
                </div>
            `;
        });

        // 6. CSV 추출 이벤트 등록
        document.getElementById('btnExportCSV').addEventListener('click', function() {
            if (finalWinners.length === 0) {
                alert("저장할 당첨 데이터가 없습니다.");
                return;
            }
            let csv = "\uFEFF상품명,당첨자이름\n";
            finalWinners.forEach(row => {
                csv += `"${row.prize}","${row.name}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Raffle_Results.csv';
            a.click();
        });
    </script>
</body>
</html>
