<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MX Division Raffle System</title>
    <style>
        :root {
            --bg: #0a0f1e;
            --panel: #161e31;
            --accent: #00f2ff;
            --text: #ffffff;
        }
        body {
            margin: 0; padding: 20px; font-family: sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; height: 100vh; gap: 20px; box-sizing: border-box;
        }
        .sidebar {
            width: 300px; background: var(--panel); padding: 20px;
            border-radius: 12px; border: 1px solid var(--accent);
            display: flex; flex-direction: column; gap: 15px;
        }
        .main {
            flex: 1; background: var(--panel); border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; overflow: hidden; border: 1px solid #2d3748;
        }
        textarea, input {
            width: 100%; background: #0a0f1e; color: white; border: 1px solid #4a5568;
            padding: 10px; border-radius: 6px; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; cursor: pointer; border-radius: 6px;
            font-weight: bold; background: transparent; color: var(--accent);
            border: 1px solid var(--accent); transition: 0.2s;
        }
        button:hover { background: var(--accent); color: #000; }
        #poolDisplay { font-size: 24px; color: var(--accent); font-weight: bold; text-align: center; }
        .modal {
            position: absolute; inset: 0; background: rgba(10, 15, 30, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--accent); margin-top: 0;">MX RAFFLE</h2>
        <label>1. 명단 입력 (이름만 입력 가능)</label>
        <textarea id="nameInput" rows="8" placeholder="이범준&#10;홍길동&#10;권나라"></textarea>
        <button ON-CLICK="updateData()">데이터 갱신</button>
        <div id="poolDisplay">0 명</div>
        <hr style="width:100%; border: 0.5px solid #2d3748;">
        <label>2. 상품 설정</label>
        <input type="text" id="prizeTitle" placeholder="상품명 입력">
        <input type="number" id="prizeQty" value="1" min="1">
        <button ON-CLICK="prepareDraw()" style="font-size: 1.1em; border-width: 2px;">추첨 준비</button>
        <button ON-CLICK="exportCSV()" style="margin-top: auto; border-color: #48bb78; color: #48bb78;">결과 CSV 저장</button>
    </div>

    <div class="main" id="drawArea">
        <div style="color: #718096; text-align: center;">
            <p style="font-size: 50px; margin: 0;">🎲</p>
            <p>좌측에서 데이터를 입력하고 추첨을 시작하세요.</p>
        </div>
    </div>

    <div class="modal" id="resultModal">
        <h1 id="winnerAnnounce" style="color: #f6e05e; font-size: 3em; margin-bottom: 10px;">당첨자!</h1>
        <div id="winnerNames" style="font-size: 1.5em; margin-bottom: 30px; text-align: center;"></div>
        <button ON-CLICK="closeModal()" style="width: auto; padding: 15px 50px;">확인 및 다음 추첨</button>
    </div>

    <script>
        let participants = [];
        let finalWinners = [];

        function updateData() {
            const raw = document.getElementById('nameInput').value.trim();
            if (!raw) { alert("명단을 입력해주세요."); return; }
           
            const lines = raw.split('\n');
            participants = lines.map((line, i) => {
                const parts = line.split(/\s+/);
                const name = parts[0];
                const weight = parseInt(parts[1]) || 1;
                return { id: i, name: name, weight: weight };
            }).filter(p => p.name);

            document.getElementById('poolDisplay').innerText = participants.length + " 명";
            console.log("파싱 결과:", participants);
        }

        function prepareDraw() {
            const qty = parseInt(document.getElementById('prizeQty').value);
            const prize = document.getElementById('prizeTitle').value;
            if (participants.length < qty) { alert("인원이 부족합니다."); return; }
            if (!prize) { alert("상품명을 입력하세요."); return; }

            const drawArea = document.getElementById('drawArea');
            drawArea.innerHTML = `
                <h2 style="color: var(--accent); margin-bottom: 40px;">${prize} 추첨 (${qty}명)</h2>
                <div id="visualizer" style="width: 80%; text-align: center; font-size: 2em; font-weight: bold; min-height: 100px;">
                    버튼을 누르면 추첨이 시작됩니다.
                </div>
                <button ON-CLICK="startDraw(${qty}, '${prize}')" style="width: 300px; padding: 20px; font-size: 24px; margin-top: 40px; border-radius: 50px;">START</button>
            `;
        }

        function startDraw(qty, prize) {
            let tempPool = [...participants];
            let winners = [];

            for (let i = 0; i < qty; i++) {
                let totalWeight = tempPool.reduce((s, p) => s + p.weight, 0);
                let random = Math.random() * totalWeight;
                for (let j = 0; j < tempPool.length; j++) {
                    random -= tempPool[j].weight;
                    if (random <= 0) {
                        winners.push(tempPool[j]);
                        tempPool.splice(j, 1);
                        break;
                    }
                }
            }

            // 시각적 효과
            const vis = document.getElementById('visualizer');
            let count = 0;
            const interval = setInterval(() => {
                vis.innerText = participants[Math.floor(Math.random() * participants.length)].name;
                count++;
                if (count > 20) {
                    clearInterval(interval);
                    showFinalWinners(winners, prize);
                }
            }, 50);
        }

        function showFinalWinners(winners, prize) {
            const modal = document.getElementById('resultModal');
            const nameArea = document.getElementById('winnerNames');
            nameArea.innerHTML = winners.map(w => `<div>${w.name}</div>`).join('');
           
            // 당첨자 처리 (중복 방지)
            winners.forEach(w => {
                finalWinners.push({ prize: prize, name: w.name });
                participants = participants.filter(p => p.id !== w.id);
            });
           
            document.getElementById('poolDisplay').innerText = participants.length + " 명";
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
            document.getElementById('drawArea').innerHTML = '<div style="color: #718096; text-align: center;"><p style="font-size: 50px; margin: 0;">🎲</p><p>다음 추첨을 준비하세요.</p></div>';
        }

        function exportCSV() {
            if (finalWinners.length === 0) return;
            let csv = "\uFEFF상품,당첨자\n";
            finalWinners.forEach(row => csv += `${row.prize},${row.name}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '당첨자결과.csv';
            a.click();
        }
    </script>
</body>
</html>
