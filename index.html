<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>MX e-Sports Raffle System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Noto+Sans+KR:wght@400;700&display=swap');
        
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(20, 25, 40, 0.6);
            --accent-main: #00f0ff;
            --accent-sec: #ff0055;
            --accent-thr: #facc15;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
        }

        body {
            margin: 0; padding: 20px; font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #1a0b2e 0%, #050505 70%);
            color: var(--text-main); display: flex; height: 100vh; gap: 20px; box-sizing: border-box; overflow: hidden;
        }

        /* Glassmorphism Panel */
        .sidebar {
            width: 340px; background: var(--panel-bg); padding: 25px;
            border-radius: 16px; border: 1px solid rgba(0, 240, 255, 0.2);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10; flex-shrink: 0;
        }

        .main {
            flex: 1; border-radius: 16px; position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8); overflow: hidden;
        }

        h2.brand {
            font-family: 'Orbitron', sans-serif; font-size: 28px; font-weight: 800;
            color: var(--text-main); text-align: center; margin: 0;
            text-shadow: 0 0 10px var(--accent-main), 0 0 20px var(--accent-main);
            letter-spacing: 2px;
        }

        label { font-size: 12px; color: var(--accent-main); font-weight: bold; text-transform: uppercase; letter-spacing: 1px;}
        
        textarea, input {
            width: 100%; background: rgba(0,0,0,0.5); color: white;
            border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 8px;
            box-sizing: border-box; outline: none; font-family: inherit; font-size: 14px;
            transition: all 0.3s ease;
        }
        textarea:focus, input:focus { border-color: var(--accent-main); box-shadow: 0 0 10px rgba(0,240,255,0.3); }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 10px; }
        .mode-btn {
            flex: 1; padding: 10px 5px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-muted); border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold;
            transition: 0.3s;
        }
        .mode-btn.active { background: rgba(0, 240, 255, 0.2); border-color: var(--accent-main); color: var(--text-main); text-shadow: 0 0 5px var(--accent-main); }

        button.action-btn {
            width: 100%; padding: 16px; cursor: pointer; border-radius: 8px; font-weight: 800;
            background: linear-gradient(45deg, transparent, rgba(0, 240, 255, 0.1));
            color: var(--accent-main); border: 1px solid var(--accent-main);
            transition: all 0.3s; font-size: 16px; text-transform: uppercase; letter-spacing: 2px;
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
        }
        button.action-btn:hover:not(:disabled) { background: var(--accent-main); color: #000; box-shadow: 0 0 20px var(--accent-main); }
        button.action-btn:disabled { border-color: #333; color: #555; cursor: not-allowed; background: transparent; box-shadow: none;}
        
        button.export-btn { border-color: #48bb78; color: #48bb78; }
        button.export-btn:hover { background: #48bb78; box-shadow: 0 0 20px #48bb78; }

        #poolDisplay { font-size: 20px; color: var(--text-main); text-align: center; font-weight: bold; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; }

        /* Timer UI */
        #gameTimer {
            position: absolute; top: 20px; right: 20px; font-family: 'Orbitron', sans-serif;
            font-size: 30px; color: var(--accent-main); font-weight: 800; z-index: 5;
            text-shadow: 0 0 10px var(--accent-main); display: none;
        }

        canvas { display: block; width: 100%; height: 100%; }

        .modal {
            position: absolute; inset: 0; background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(10px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .modal h1 { font-family: 'Orbitron', sans-serif; color: var(--accent-thr); font-size: 5em; margin: 0 0 10px 0; text-shadow: 0 0 40px var(--accent-thr); }
        .modal h2 { color: var(--text-main); font-size: 2em; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 class="brand">MX ESPORTS</h2>
        
        <label>1. 참가자 데이터 (이름 점수)</label>
        <textarea id="nameInput" rows="5" placeholder="이범준 10&#10;홍길동 3&#10;권나라 1"></textarea>
        <button type="button" class="action-btn" id="btnUpdateData" style="padding: 12px; font-size: 14px;">데이터 로드</button>
        <div id="poolDisplay">0 명 대기중</div>
        
        <hr style="width:100%; border: 0; border-top: 1px solid rgba(255,255,255,0.1);">
        
        <label>2. 게임 모드 선택</label>
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="racing">🏎️ 그랑프리</button>
            <button class="mode-btn" data-mode="pinball">🎯 플링코</button>
            <button class="mode-btn" data-mode="wrestling">🤼 로얄럼블</button>
        </div>

        <label>3. 라운드 설정</label>
        <input type="text" id="prizeTitle" placeholder="상품명 입력">
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="number" id="prizeQty" value="1" min="1">
            <span style="font-size: 14px; color: var(--text-muted); white-space: nowrap;">명 추첨</span>
        </div>
        
        <button type="button" class="action-btn" id="btnStartGame" style="margin-top: 10px;">🔥 GAME START</button>
        <button type="button" class="action-btn export-btn" id="btnExportCSV" style="margin-top: auto;">엑셀 다운로드</button>
    </div>

    <div class="main" id="gameContainer">
        <div id="gameTimer">00:00</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="modal" id="resultModal">
        <h1>WINNER</h1>
        <h2 id="modalPrizeTitle"></h2>
        <div id="winnerNames" style="font-size: 2.5em; margin-bottom: 40px; text-align: center; color: white; font-weight: bold; max-height: 40vh; overflow-y: auto;"></div>
        <button type="button" class="action-btn" id="btnCloseModal" style="width: auto; padding: 15px 60px; font-size: 18px;">명단 제외 및 다음 게임</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const timerUI = document.getElementById('gameTimer');
        
        let participants = [];
        let finalWinners = [];
        let entities = [];
        let currentWinners = [];
        
        let animationId;
        let gameActive = false;
        let gameMode = 'racing'; // racing, pinball, wrestling
        
        let startTime = 0;
        const TIME_LIMIT = 60000; // 60초 (1분)
        const SUDDEN_DEATH_TIME = 50000; // 50초 이후 서든데스 발동

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 모드 선택 UI
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                gameMode = this.getAttribute('data-mode');
                drawIdleScreen();
            });
        });

        // 아바타 결정
        function getAvatar(weight) {
            if (weight >= 10) return '🚀';
            if (weight >= 6) return '🏎️';
            if (weight >= 4) return '🚗';
            if (weight >= 2) return '🏃';
            return '🐢';
        }

        // 데이터 로드
        document.getElementById('btnUpdateData').addEventListener('click', function() {
            const raw = document.getElementById('nameInput').value.trim();
            if (!raw) return;
            const lines = raw.split('\n');
            participants = [];
            lines.forEach((line, idx) => {
                const match = line.trim().match(/^(.*?)(?:(?:\||\t|\s)+(\d+))?\s*$/);
                if (match && match[1]) {
                    const weight = match[2] ? parseInt(match[2], 10) : 1; 
                    participants.push({
                        id: 'p_' + idx + '_' + Date.now(),
                        name: match[1].trim(),
                        weight: weight,
                        avatar: getAvatar(weight),
                        color: `hsl(${Math.random() * 360}, 80%, 60%)`
                    });
                }
            });
            document.getElementById('poolDisplay').innerText = `${participants.length} 명 대기중`;
            drawIdleScreen();
        });

        function drawIdleScreen() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.font = '30px "Orbitron"';
            ctx.textAlign = 'center';
            let modeName = gameMode === 'racing' ? 'GRAND PRIX' : gameMode === 'pinball' ? 'PLINKO DROP' : 'ROYAL RUMBLE';
            ctx.fillText(`SYSTEM STANDBY : ${modeName} MODE`, canvas.width/2, canvas.height/2);
        }
        drawIdleScreen();

        // 게임 시작
        document.getElementById('btnStartGame').addEventListener('click', function() {
            const qty = parseInt(document.getElementById('prizeQty').value);
            const prize = document.getElementById('prizeTitle').value.trim();
            if (participants.length < qty) { alert("참가자가 부족합니다."); return; }
            if (!prize) { alert("상품명을 입력하세요."); return; }

            this.disabled = true;
            document.getElementById('resultModal').style.display = 'none';
            timerUI.style.display = 'block';
            currentWinners = [];
            
            initEntities();
            startTime = Date.now();
            gameActive = true;
            
            cancelAnimationFrame(animationId);
            gameLoop(qty, prize);
        });

        // 엔티티(참가자 물리 객체) 초기화
        function initEntities() {
            entities = participants.map((p, i) => {
                let e = { ...p, status: 'normal', finished: false };
                if (gameMode === 'racing') {
                    const trackH = canvas.height / participants.length;
                    e.x = 50; e.y = i * trackH + (trackH / 2); e.progress = 0;
                    e.speed = (Math.random() * 0.02) + (p.weight * 0.005);
                } else if (gameMode === 'pinball') {
                    e.x = (canvas.width / participants.length) * i + Math.random()*20;
                    e.y = -50 - Math.random() * 200;
                    e.vx = (Math.random() - 0.5) * 5; e.vy = 0; e.radius = 15;
                } else if (gameMode === 'wrestling') {
                    e.x = canvas.width / 2 + (Math.random() - 0.5) * 200;
                    e.y = canvas.height / 2 + (Math.random() - 0.5) * 200;
                    e.vx = (Math.random() - 0.5) * 10; e.vy = (Math.random() - 0.5) * 10;
                    e.hp = 100 + (p.weight * 10); e.radius = 20;
                }
                return e;
            });
        }

        // 통합 게임 루프
        function gameLoop(targetWinCount, prize) {
            if (!gameActive) return;
            
            const elapsed = Date.now() - startTime;
            const remaining = Math.max(0, 60 - Math.floor(elapsed / 1000));
            timerUI.innerText = `00:${remaining.toString().padStart(2, '0')}`;
            
            // 서든데스 확인 (50초 이후)
            const isSuddenDeath = elapsed > SUDDEN_DEATH_TIME;
            if (isSuddenDeath) {
                timerUI.style.color = '#ff0055';
                timerUI.classList.add('shake-active');
            } else {
                timerUI.style.color = '#00f0ff';
                timerUI.classList.remove('shake-active');
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameMode === 'racing') updateRacing(elapsed, isSuddenDeath, targetWinCount);
            else if (gameMode === 'pinball') updatePinball(elapsed, isSuddenDeath, targetWinCount);
            else if (gameMode === 'wrestling') updateWrestling(elapsed, isSuddenDeath, targetWinCount);

            if (currentWinners.length >= targetWinCount) {
                gameActive = false;
                setTimeout(() => showResult(prize), 1000);
            } else {
                animationId = requestAnimationFrame(() => gameLoop(targetWinCount, prize));
            }
        }

        // 1. 레이싱 물리 엔진
        function updateRacing(elapsed, isSuddenDeath, targetWinCount) {
            const finishLineX = canvas.width - 150;
            
            // 배경
            ctx.fillStyle = 'rgba(0, 240, 255, 0.1)';
            ctx.fillRect(finishLineX, 0, 5, canvas.height);

            let maxProgress = Math.max(...entities.map(e => e.progress));

            entities.forEach(e => {
                if (e.finished) { renderEntity(e, 'racing'); return; }

                let currentSpeed = e.speed;

                // 타임 게이트 로직: 50초 이전에는 아무도 90%를 넘지 못하도록 강제 억제 (서스펜스)
                if (!isSuddenDeath && e.progress > 85) {
                    currentSpeed *= 0.1; // 엄청 느려짐
                }
                
                // 서든데스 발동: 폭발적인 속도 증가 (가중치 영향 큼)
                if (isSuddenDeath) {
                    currentSpeed += (Math.random() * 0.5) + (e.weight * 0.1);
                }

                // 고무줄 효과: 뒤쳐진 사람 버프
                if (e.progress < maxProgress - 30) currentSpeed *= 1.5;

                e.progress += currentSpeed;
                e.x = 50 + (e.progress / 100) * (finishLineX - 50);

                if (e.x >= finishLineX) {
                    e.x = finishLineX; e.finished = true;
                    if (currentWinners.length < targetWinCount) currentWinners.push(e);
                }
                renderEntity(e, 'racing');
            });
        }

        // 2. 핀볼 (플링코) 물리 엔진
        function updatePinball(elapsed, isSuddenDeath, targetWinCount) {
            // 하단 당첨 슬롯
            const slotHeight = 100;
            ctx.fillStyle = 'rgba(250, 204, 21, 0.2)';
            ctx.fillRect(0, canvas.height - slotHeight, canvas.width, slotHeight);
            ctx.fillStyle = '#facc15'; ctx.font = '20px Orbitron'; ctx.textAlign = 'center';
            ctx.fillText("WINNER ZONE", canvas.width/2, canvas.height - 40);

            entities.forEach(e => {
                if (e.finished) { renderEntity(e, 'pinball'); return; }

                e.vy += 0.2; // 중력
                e.x += e.vx; e.y += e.vy;

                // 벽 튕기기
                if (e.x < e.radius || e.x > canvas.width - e.radius) { e.vx *= -1; e.x = Math.max(e.radius, Math.min(e.x, canvas.width - e.radius)); }

                // 타임 게이트: 50초 이전에는 하단에 닿으면 강제로 위로 튕겨올림 (점프 패드)
                if (!isSuddenDeath && e.y > canvas.height - slotHeight - 50) {
                    e.vy = -10 - Math.random() * 10; // 높이 튕김
                    e.vx = (Math.random() - 0.5) * 20;
                }

                // 서든 데스: 무거운 중력 적용, 당첨 존 입성 허용
                if (isSuddenDeath) {
                    e.vy += 0.5;
                }

                if (e.y > canvas.height - 20) {
                    e.y = canvas.height - 20; e.vy = 0; e.vx = 0; e.finished = true;
                    if (currentWinners.length < targetWinCount) currentWinners.push(e);
                }
                renderEntity(e, 'pinball');
            });
        }

        // 3. 로얄 럼블 (레슬링) 물리 엔진
        function updateWrestling(elapsed, isSuddenDeath, targetWinCount) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // 링 크기 (시간이 지날수록 줄어드는 자기장)
            let ringRadius = isSuddenDeath ? Math.max(50, 300 - (elapsed - SUDDEN_DEATH_TIME)/20) : 300;
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, ringRadius, 0, Math.PI * 2);
            ctx.strokeStyle = isSuddenDeath ? '#ff0055' : '#00f0ff';
            ctx.lineWidth = 5; ctx.stroke();
            if(isSuddenDeath) { ctx.fillStyle='rgba(255,0,85,0.1)'; ctx.fill(); }

            let aliveEntities = entities.filter(e => !e.finished);

            aliveEntities.forEach(e => {
                e.x += e.vx; e.y += e.vy;
                
                // 마찰력
                e.vx *= 0.98; e.vy *= 0.98;

                // 중앙으로 모이는 미세한 인력 (난전 유도)
                e.vx += (centerX - e.x) * 0.001; e.vy += (centerY - e.y) * 0.001;

                // 벽(링) 충돌 처리
                const distFromCenter = Math.hypot(e.x - centerX, e.y - centerY);
                if (distFromCenter > ringRadius - e.radius) {
                    // 서든 데스 시 링 밖으로 나가면 아웃 (당첨) - 역발상: 튕겨져 나가는게 승리
                    if (isSuddenDeath) {
                        e.finished = true;
                        if (currentWinners.length < targetWinCount) currentWinners.push(e);
                    } else {
                        // 일반 시간엔 튕겨서 돌아옴
                        const angle = Math.atan2(e.y - centerY, e.x - centerX);
                        e.vx = -Math.cos(angle) * 10; e.vy = -Math.sin(angle) * 10;
                    }
                }

                // 엔티티 간 충돌 (튕겨내기)
                aliveEntities.forEach(other => {
                    if (e !== other) {
                        const dx = other.x - e.x; const dy = other.y - e.y;
                        const dist = Math.hypot(dx, dy);
                        if (dist < e.radius + other.radius) {
                            const angle = Math.atan2(dy, dx);
                            const power = (e.weight / 10) + Math.random() * 5; // 가중치 높을수록 튕겨내는 힘 강함
                            other.vx += Math.cos(angle) * power;
                            other.vy += Math.sin(angle) * power;
                        }
                    }
                });

                renderEntity(e, 'wrestling');
            });
            
            // 만약 생존자가 뽑을 인원과 같아지면 그 생존자들이 승리하는 로직도 가능하나,
            // 빠른 결론을 위해 '링 밖으로 튕겨 나간 자'를 우승자로 판정 (배틀그라운드 자기장 밖 탈출 컨셉)
        }

        // 공통 렌더링 함수
        function renderEntity(e, mode) {
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            if (mode === 'racing') {
                const fontSize = Math.max(16, canvas.height / participants.length * 0.8);
                ctx.font = `${fontSize}px Arial`; ctx.fillText(e.avatar, e.x, e.y);
                ctx.font = `bold ${fontSize*0.6}px "Noto Sans KR"`;
                ctx.fillStyle = e.finished ? '#facc15' : '#fff';
                ctx.textAlign = 'left'; ctx.fillText(e.name, e.x + 15, e.y);
            } else {
                // Pinball & Wrestling
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                ctx.fillStyle = e.color; ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
                
                ctx.fillStyle = '#fff'; ctx.font = 'bold 12px "Noto Sans KR"';
                ctx.fillText(e.name.substring(0,2), e.x, e.y); // 원 안에 이름 2글자
            }
        }

        // 게임 종료 처리
        function showResult(prize) {
            timerUI.style.display = 'none';
            document.getElementById('modalPrizeTitle').innerText = `[ ${prize} ]`;
            document.getElementById('winnerNames').innerHTML = currentWinners.map((w, i) => `<div><span style="color:#facc15; font-size:0.6em;">${i+1}위</span> ${w.name}</div>`).join('');
            document.getElementById('resultModal').style.display = 'flex';
            document.getElementById('btnStartGame').disabled = false;
        }

        document.getElementById('btnCloseModal').addEventListener('click', function() {
            currentWinners.forEach(w => finalWinners.push({ prize: document.getElementById('prizeTitle').value, name: w.name }));
            const winnerIds = currentWinners.map(w => w.id);
            participants = participants.filter(p => !winnerIds.includes(p.id));
            
            document.getElementById('poolDisplay').innerText = `${participants.length} 명 대기중`;
            document.getElementById('resultModal').style.display = 'none';
            document.getElementById('prizeTitle').value = ""; 
            drawIdleScreen();
        });

        // 엑셀 저장
        document.getElementById('btnExportCSV').addEventListener('click', function() {
            if (finalWinners.length === 0) { alert("저장할 데이터가 없습니다."); return; }
            let csv = "\uFEFF상품명,당첨자이름\n";
            finalWinners.forEach(row => { csv += `"${row.prize}","${row.name}"\n`; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'e스포츠_최종결과.csv'; a.click();
        });
    </script>
</body>
</html>
