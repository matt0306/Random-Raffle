<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>MX e-Sports Raffle System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Noto+Sans+KR:wght@400;700&display=swap');
        
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(20, 25, 40, 0.75);
            --accent-main: #00f0ff;
            --accent-sec: #ff0055;
            --accent-thr: #facc15;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
        }

        body {
            margin: 0; padding: 20px; font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-color); color: var(--text-main);
            display: flex; height: 100vh; gap: 20px; box-sizing: border-box; overflow: hidden;
            transition: background 0.5s ease;
        }

        /* 게임 모드별 배경 설정 */
        body.mode-racing { background: radial-gradient(circle at 50% 0%, #10182b 0%, #050505 80%); }
        body.mode-pinball { background: radial-gradient(circle at 50% 0%, #2b1022 0%, #050505 80%); }
        body.mode-wrestling { background: radial-gradient(circle at 50% 50%, #2b1010 0%, #050505 80%); }

        .sidebar {
            width: 350px; background: var(--panel-bg); padding: 25px;
            border-radius: 16px; border: 1px solid rgba(0, 240, 255, 0.2);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 10; flex-shrink: 0;
        }

        .main {
            flex: 1; border-radius: 16px; position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9); overflow: hidden;
        }

        h2.brand {
            font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 800;
            color: var(--text-main); text-align: center; margin: 0;
            text-shadow: 0 0 10px var(--accent-main), 0 0 20px var(--accent-main);
            letter-spacing: 3px;
        }

        label { font-size: 13px; color: var(--accent-main); font-weight: bold; text-transform: uppercase; }
        
        textarea, input {
            width: 100%; background: rgba(0,0,0,0.6); color: white;
            border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 8px;
            box-sizing: border-box; outline: none; font-family: inherit; font-size: 15px;
            transition: all 0.3s ease;
        }
        textarea:focus, input:focus { border-color: var(--accent-main); box-shadow: 0 0 10px rgba(0,240,255,0.3); }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 5px; }
        .mode-btn {
            flex: 1; padding: 12px 5px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-muted); border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold;
            transition: 0.3s;
        }
        .mode-btn.active { background: rgba(0, 240, 255, 0.2); border-color: var(--accent-main); color: var(--text-main); text-shadow: 0 0 5px var(--accent-main); }

        button.action-btn {
            width: 100%; padding: 18px; cursor: pointer; border-radius: 8px; font-weight: 800;
            background: linear-gradient(45deg, transparent, rgba(0, 240, 255, 0.15));
            color: var(--accent-main); border: 1px solid var(--accent-main);
            transition: all 0.3s; font-size: 18px; letter-spacing: 2px;
            font-family: 'Orbitron', 'Noto Sans KR', sans-serif;
        }
        button.action-btn:hover:not(:disabled) { background: var(--accent-main); color: #000; box-shadow: 0 0 25px var(--accent-main); }
        button.action-btn:disabled { border-color: #333; color: #555; cursor: not-allowed; background: transparent; }
        
        button.export-btn { border-color: #48bb78; color: #48bb78; padding: 12px; font-size: 14px; }
        button.export-btn:hover { background: #48bb78; box-shadow: 0 0 20px #48bb78; }

        #poolDisplay { font-size: 22px; color: var(--text-main); text-align: center; font-weight: bold; padding: 12px; background: rgba(0,0,0,0.4); border-radius: 8px; }

        #gameTimer {
            position: absolute; top: 25px; right: 30px; font-family: 'Orbitron', sans-serif;
            font-size: 45px; color: var(--accent-main); font-weight: 800; z-index: 5;
            text-shadow: 0 0 15px var(--accent-main); display: none;
        }

        canvas { display: block; width: 100%; height: 100%; }

        .modal {
            position: absolute; inset: 0; background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(15px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .modal h1 { font-family: 'Orbitron', sans-serif; color: var(--accent-thr); font-size: 6em; margin: 0 0 10px 0; text-shadow: 0 0 50px var(--accent-thr); }
        .modal h2 { color: var(--text-main); font-size: 2.5em; margin-bottom: 40px; text-shadow: 0 0 10px #fff; }
        
        .winner-list {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;
            width: 80%; max-height: 50vh; overflow-y: auto; margin-bottom: 40px; padding: 10px;
        }
        .winner-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--accent-thr);
            border-radius: 10px; padding: 15px; text-align: center;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.2);
        }
        .rank-badge { font-family: 'Orbitron', sans-serif; color: var(--accent-thr); font-size: 1.2em; font-weight: bold; margin-bottom: 5px; }
        .winner-name { font-size: 1.8em; font-weight: bold; color: white; }

        /* 화면 흔들림 효과 */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-3px, 3px); }
            50% { transform: translate(3px, -3px); }
            75% { transform: translate(-3px, -3px); }
        }
        .shake-active { animation: shake 0.2s infinite; }
    </style>
</head>
<body class="mode-racing">
    <div class="sidebar">
        <h2 class="brand">MX ESPORTS</h2>
        
        <label>1. 참가자 등록 (이름과 가중치)</label>
        <textarea id="nameInput" rows="8" placeholder="이범준10&#10;홍길동 3&#10;권나라"></textarea>
        <button type="button" class="action-btn" id="btnUpdateData" style="padding: 14px; font-size: 15px;">데이터 파싱</button>
        <div id="poolDisplay">0 명 대기중</div>
        
        <hr style="width:100%; border: 0; border-top: 1px solid rgba(255,255,255,0.1);">
        
        <label>2. 게임 모드</label>
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="racing">🏎️ 그랑프리</button>
            <button class="mode-btn" data-mode="pinball">🎯 핀볼드롭</button>
            <button class="mode-btn" data-mode="wrestling">🤼 로얄럼블</button>
        </div>

        <label>3. 라운드 세팅</label>
        <input type="text" id="prizeTitle" placeholder="상품명 (예: 아이패드)">
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="number" id="prizeQty" value="1" min="1">
            <span style="font-size: 15px; color: var(--text-muted); font-weight: bold;">명 추출</span>
        </div>
        
        <button type="button" class="action-btn" id="btnStartGame" style="margin-top: 15px;">🚀 START GAME</button>
        <button type="button" class="action-btn export-btn" id="btnExportCSV" style="margin-top: auto;">결과 엑셀 저장</button>
    </div>

    <div class="main" id="gameContainer">
        <div id="gameTimer">00:00</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="modal" id="resultModal">
        <h1>WINNER</h1>
        <h2 id="modalPrizeTitle"></h2>
        <div class="winner-list" id="winnerNames"></div>
        <button type="button" class="action-btn" id="btnCloseModal" style="width: auto; padding: 18px 60px; font-size: 20px;">당첨자 제외 확정</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const timerUI = document.getElementById('gameTimer');
        
        let participants = [];
        let finalWinners = [];
        let entities = [];
        let currentWinners = [];
        let pegs = []; // 핀볼용 장애물
        
        let animationId;
        let gameActive = false;
        let gameMode = 'racing'; 
        
        let startTime = 0;
        let totalGameTimeMs = 0;
        let suddenDeathTimeMs = 0;

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                gameMode = this.getAttribute('data-mode');
                document.body.className = `mode-${gameMode}`; // 배경색 변경
                drawIdleScreen();
            });
        });

        function getAvatar(weight) {
            if (weight >= 10) return '🚀';
            if (weight >= 6) return '🏎️';
            if (weight >= 4) return '🚗';
            if (weight >= 2) return '🏃';
            return '🐢';
        }

        // 정규식 개선: 띄어쓰기 없이 '이범준10' 도 완벽 인식
        document.getElementById('btnUpdateData').addEventListener('click', function() {
            const raw = document.getElementById('nameInput').value.trim();
            if (!raw) return;
            const lines = raw.split('\n');
            participants = [];
            lines.forEach((line, idx) => {
                // 숫자가 아닌 문자열(이름) + 뒤에 숫자(가중치) 추출
                const match = line.trim().match(/^([^\d]+)(?:[\s\|]*(\d+))?\s*$/);
                if (match && match[1]) {
                    const name = match[1].trim();
                    const weight = match[2] ? parseInt(match[2], 10) : 1; 
                    participants.push({
                        id: 'p_' + idx + '_' + Date.now(),
                        name: name,
                        weight: weight,
                        avatar: getAvatar(weight),
                        color: `hsl(${Math.random() * 360}, 80%, 60%)`
                    });
                }
            });
            document.getElementById('poolDisplay').innerText = `${participants.length} 명 대기중`;
            drawIdleScreen();
        });

        function drawIdleScreen() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.font = 'bold 36px "Orbitron"';
            ctx.textAlign = 'center';
            let modeName = gameMode === 'racing' ? 'GRAND PRIX' : gameMode === 'pinball' ? 'PLINKO DROP' : 'ROYAL RUMBLE';
            ctx.fillText(`SYSTEM STANDBY : ${modeName}`, canvas.width/2, canvas.height/2);
        }
        drawIdleScreen();

        // 🚀 전체화면 트리거 함수
        function goFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen().catch(err => console.log(err)); }
        }

        document.getElementById('btnStartGame').addEventListener('click', function() {
            const qty = parseInt(document.getElementById('prizeQty').value);
            const prize = document.getElementById('prizeTitle').value.trim();
            if (participants.length < qty) { alert("참가자가 부족합니다."); return; }
            if (!prize) { alert("상품명을 입력하세요."); return; }

            goFullscreen(); // 시작 시 전체화면

            // 게임 시간 동적 계산 (인원 * 0.4초, 최소 30초, 최대 120초)
            const calcTime = Math.max(30, Math.min(120, participants.length * 0.4));
            totalGameTimeMs = calcTime * 1000;
            suddenDeathTimeMs = totalGameTimeMs - 10000; // 마지막 10초

            this.disabled = true;
            document.getElementById('resultModal').style.display = 'none';
            timerUI.style.display = 'block';
            currentWinners = [];
            
            initEntities();
            startTime = Date.now();
            gameActive = true;
            
            cancelAnimationFrame(animationId);
            gameLoop(qty, prize);
        });

        function initEntities() {
            // 핀볼용 페그(장애물) 생성
            if (gameMode === 'pinball') {
                pegs = [];
                const cols = 15; const rows = 10;
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        let offset = (r % 2 === 0) ? 0 : (canvas.width / cols) / 2;
                        pegs.push({
                            x: (c * (canvas.width / cols)) + offset,
                            y: (r * (canvas.height / rows)) + 50,
                            radius: 8
                        });
                    }
                }
            }

            entities = participants.map((p, i) => {
                let e = { ...p, status: 'normal', finished: false, eliminated: false };
                if (gameMode === 'racing') {
                    const trackH = canvas.height / participants.length;
                    e.x = 50; e.y = i * trackH + (trackH / 2); e.progress = 0;
                    e.speed = (Math.random() * 0.03) + (p.weight * 0.008);
                    e.baseSpeed = e.speed;
                } else if (gameMode === 'pinball') {
                    e.x = (canvas.width / participants.length) * i + Math.random()*10;
                    e.y = -50 - Math.random() * 300;
                    e.vx = (Math.random() - 0.5) * 2; e.vy = 0; 
                    e.radius = Math.max(8, Math.min(15, 300 / participants.length));
                } else if (gameMode === 'wrestling') {
                    e.x = canvas.width / 2 + (Math.random() - 0.5) * 150;
                    e.y = canvas.height / 2 + (Math.random() - 0.5) * 150;
                    e.vx = (Math.random() - 0.5) * 5; e.vy = (Math.random() - 0.5) * 5;
                    e.radius = Math.max(10, Math.min(25, 400 / participants.length));
                    e.mass = e.weight; 
                }
                return e;
            });
        }

        function gameLoop(targetWinCount, prize) {
            if (!gameActive) return;
            
            const elapsed = Date.now() - startTime;
            const remaining = Math.max(0, Math.ceil((totalGameTimeMs - elapsed) / 1000));
            timerUI.innerText = `00:${remaining.toString().padStart(2, '0')}`;
            
            const isSuddenDeath = elapsed >= suddenDeathTimeMs;
            
            if (isSuddenDeath) {
                timerUI.style.color = '#ff0055';
                document.getElementById('gameContainer').classList.add('shake-active');
            } else {
                timerUI.style.color = '#00f0ff';
                document.getElementById('gameContainer').classList.remove('shake-active');
            }

            // 타임오버 시 게임 강제 종료
            if (elapsed >= totalGameTimeMs && gameMode !== 'wrestling') {
                finalizeGame(targetWinCount, prize);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameMode === 'racing') updateRacing(elapsed, isSuddenDeath, targetWinCount);
            else if (gameMode === 'pinball') updatePinball(elapsed, isSuddenDeath, targetWinCount);
            else if (gameMode === 'wrestling') updateWrestling(elapsed, isSuddenDeath, targetWinCount, prize);

            if (gameActive) {
                if (currentWinners.length >= targetWinCount && gameMode !== 'wrestling') {
                    finalizeGame(targetWinCount, prize);
                } else {
                    animationId = requestAnimationFrame(() => gameLoop(targetWinCount, prize));
                }
            }
        }

        function finalizeGame(targetWinCount, prize) {
            gameActive = false;
            document.getElementById('gameContainer').classList.remove('shake-active');
            
            // 승자가 부족하면 진척도(거리/높이) 기반으로 채움
            if (currentWinners.length < targetWinCount) {
                let sorted = [];
                if (gameMode === 'racing') sorted = entities.filter(e => !e.finished).sort((a,b) => b.progress - a.progress);
                if (gameMode === 'pinball') sorted = entities.filter(e => !e.finished).sort((a,b) => b.y - a.y);
                
                const needed = targetWinCount - currentWinners.length;
                currentWinners.push(...sorted.slice(0, needed));
            }

            setTimeout(() => showResult(prize), 1000);
        }

        // 1. 레이싱
        function updateRacing(elapsed, isSuddenDeath, targetWinCount) {
            const finishLineX = canvas.width - 150;
            ctx.fillStyle = 'rgba(0, 240, 255, 0.2)'; ctx.fillRect(finishLineX, 0, 10, canvas.height);

            let maxProgress = Math.max(...entities.map(e => e.progress));

            entities.forEach(e => {
                if (e.finished) { renderEntity(e, 'racing'); return; }

                let currentSpeed = e.speed;

                // 타임 게이트: 일반 시간엔 90%에서 정체
                if (!isSuddenDeath && e.progress > 85) {
                    currentSpeed *= 0.05;
                }
                
                // 서든데스: 폭발적 랜덤 부스터
                if (isSuddenDeath) {
                    if (Math.random() < 0.05) e.speed += (Math.random() * 0.8) + (e.weight * 0.1);
                    currentSpeed = e.speed;
                }

                // 고무줄 효과
                if (e.progress < maxProgress - 20) currentSpeed *= 1.3;

                e.progress += currentSpeed;
                e.x = 50 + (e.progress / 100) * (finishLineX - 50);

                if (e.x >= finishLineX) {
                    e.x = finishLineX; e.finished = true;
                    if (currentWinners.length < targetWinCount) currentWinners.push(e);
                }
                renderEntity(e, 'racing');
            });
        }

        // 2. 핀볼
        function updatePinball(elapsed, isSuddenDeath, targetWinCount) {
            // 장애물 그리기
            ctx.fillStyle = isSuddenDeath ? '#ff0055' : '#00f0ff';
            pegs.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill(); });

            // 하단 당첨 슬롯
            const slotHeight = 80;
            ctx.fillStyle = 'rgba(250, 204, 21, 0.3)'; ctx.fillRect(0, canvas.height - slotHeight, canvas.width, slotHeight);
            ctx.fillStyle = '#facc15'; ctx.font = '24px Orbitron'; ctx.textAlign = 'center';
            ctx.fillText("WINNER ZONE", canvas.width/2, canvas.height - 30);

            entities.forEach(e => {
                if (e.finished) { renderEntity(e, 'pinball'); return; }

                // 서든데스 시 미친 중력
                e.vy += isSuddenDeath ? 0.8 : 0.15; 
                e.x += e.vx; e.y += e.vy;

                // 벽 충돌
                if (e.x < e.radius || e.x > canvas.width - e.radius) { e.vx *= -0.8; e.x = Math.max(e.radius, Math.min(e.x, canvas.width - e.radius)); }

                // 페그(장애물) 충돌
                if (!isSuddenDeath) { // 서든데스엔 장애물 무시하고 수직 낙하
                    pegs.forEach(p => {
                        const dx = e.x - p.x; const dy = e.y - p.y;
                        const dist = Math.hypot(dx, dy);
                        if (dist < e.radius + p.radius) {
                            const angle = Math.atan2(dy, dx);
                            e.vx += Math.cos(angle) * 3; e.vy = Math.sin(angle) * 3;
                        }
                    });
                }

                // 타임 게이트: 시간 안 됐으면 바닥 닿기 전 강제 점프
                if (!isSuddenDeath && e.y > canvas.height - slotHeight - 50) {
                    e.vy = -12 - Math.random() * 8; e.vx = (Math.random() - 0.5) * 15;
                }

                // 당첨
                if (e.y > canvas.height - 20) {
                    e.y = canvas.height - 20; e.vy = 0; e.vx = 0; e.finished = true;
                    if (currentWinners.length < targetWinCount) currentWinners.push(e);
                }
                renderEntity(e, 'pinball');
            });
        }

        // 3. 로얄 럼블 (배틀그라운드 룰: 최후의 생존자가 우승)
        function updateWrestling(elapsed, isSuddenDeath, targetWinCount, prize) {
            const cx = canvas.width / 2; const cy = canvas.height / 2;
            
            // 링 크기 조절
            let ringRadius = 350;
            if (elapsed > totalGameTimeMs * 0.3) {
                const shrinkRatio = (elapsed - totalGameTimeMs*0.3) / (totalGameTimeMs*0.7);
                ringRadius = Math.max(0, 350 - (350 * shrinkRatio)); // 서든데스 땐 0으로 수렴
            }
            
            ctx.beginPath(); ctx.arc(cx, cy, ringRadius, 0, Math.PI*2);
            ctx.strokeStyle = isSuddenDeath ? '#ff0055' : '#00f0ff'; ctx.lineWidth = 5; ctx.stroke();
            ctx.fillStyle = isSuddenDeath ? 'rgba(255,0,85,0.1)' : 'rgba(0,240,255,0.05)'; ctx.fill();

            let alive = entities.filter(e => !e.eliminated);

            alive.forEach(e => {
                e.x += e.vx; e.y += e.vy;
                e.vx *= 0.95; e.vy *= 0.95;

                // 링 밖으로 나가면 탈락 (Eliminated)
                const distFromCenter = Math.hypot(e.x - cx, e.y - cy);
                if (distFromCenter > ringRadius) {
                    e.eliminated = true;
                    // 남은 인원이 딱 뽑아야 할 인원이면 게임 종료 트리거
                    if (entities.filter(en => !en.eliminated).length === targetWinCount) {
                        currentWinners = entities.filter(en => !en.eliminated);
                        finalizeGame(targetWinCount, prize);
                    }
                } else {
                    // 중앙 인력
                    e.vx += (cx - e.x) * 0.002; e.vy += (cy - e.y) * 0.002;
                }

                // 충돌 처리
                alive.forEach(other => {
                    if (e !== other) {
                        const dx = other.x - e.x; const dy = other.y - e.y;
                        const dist = Math.hypot(dx, dy);
                        if (dist < e.radius + other.radius) {
                            const angle = Math.atan2(dy, dx);
                            const force = (e.weight * 0.5) + Math.random() * 2;
                            other.vx += Math.cos(angle) * force; other.vy += Math.sin(angle) * force;
                        }
                    }
                });
                renderEntity(e, 'wrestling');
            });
            
            // 타임오버 시 중앙에 가장 가까운 생존자들이 우승
            if (elapsed >= totalGameTimeMs && gameActive) {
                alive.sort((a,b) => Math.hypot(a.x-cx, a.y-cy) - Math.hypot(b.x-cx, b.y-cy));
                currentWinners = alive.slice(0, targetWinCount);
                finalizeGame(targetWinCount, prize);
            }
        }

        // 공통 렌더링
        function renderEntity(e, mode) {
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            if (mode === 'racing') {
                const fontSize = Math.max(16, canvas.height / participants.length * 0.7);
                ctx.font = `${fontSize}px Arial`; ctx.fillText(e.avatar, e.x, e.y);
                ctx.font = `bold ${fontSize*0.7}px "Noto Sans KR"`;
                ctx.fillStyle = e.finished ? '#facc15' : '#fff';
                ctx.textAlign = 'left'; 
                ctx.fillText(e.name, e.x + fontSize, e.y); // 이름 길이 관계없이 전부 그림
            } else {
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
                ctx.fillStyle = e.color; ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
                
                // 폰트 크기 동적 조절로 네 글자 이름도 원 안에 욱여넣음
                const fontSize = Math.max(8, e.radius * 0.7);
                ctx.fillStyle = '#fff'; ctx.font = `bold ${fontSize}px "Noto Sans KR"`;
                ctx.fillText(e.name, e.x, e.y); 
            }
        }

        // 결과 모달창
        function showResult(prize) {
            timerUI.style.display = 'none';
            document.getElementById('modalPrizeTitle').innerText = `[ ${prize} ]`;
            
            // 등수 매칭하여 UI 표시
            const listHtml = currentWinners.map((w, idx) => `
                <div class="winner-card">
                    <div class="rank-badge">${idx + 1}등</div>
                    <div class="winner-name">${w.name}</div>
                </div>
            `).join('');
            
            document.getElementById('winnerNames').innerHTML = listHtml;
            document.getElementById('resultModal').style.display = 'flex';
            document.getElementById('btnStartGame').disabled = false;
        }

        document.getElementById('btnCloseModal').addEventListener('click', function() {
            currentWinners.forEach(w => finalWinners.push({ prize: document.getElementById('prizeTitle').value, name: w.name }));
            const winnerIds = currentWinners.map(w => w.id);
            participants = participants.filter(p => !winnerIds.includes(p.id));
            
            document.getElementById('poolDisplay').innerText = `${participants.length} 명 대기중`;
            document.getElementById('resultModal').style.display = 'none';
            document.getElementById('prizeTitle').value = ""; 
            drawIdleScreen();
            
            // 전체화면 해제 (옵션)
            // if (document.exitFullscreen) document.exitFullscreen();
        });

        document.getElementById('btnExportCSV').addEventListener('click', function() {
            if (finalWinners.length === 0) { alert("저장할 데이터가 없습니다."); return; }
            let csv = "\uFEFF상품명,당첨자이름\n";
            finalWinners.forEach(row => { csv += `"${row.prize}","${row.name}"\n`; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = '익스트림_추첨결과.csv'; a.click();
        });
    </script>
</body>
</html>
