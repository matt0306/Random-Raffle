<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>MX e-Sports Raffle System v10</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        :root {
            --bg-base: #030305; --panel-bg: rgba(10, 12, 20, 0.85);
            --accent-cyan: #00f0ff; --accent-magenta: #ff0055; --accent-gold: #facc15;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0; font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-base); color: #fff;
            display: flex; height: 100vh; overflow: hidden;
            transition: background 0.8s ease;
        }

        body.mode-racing { background: radial-gradient(circle at 50% -20%, #0d1b2a 0%, var(--bg-base) 80%); }
        body.mode-pinball { background: radial-gradient(circle at 50% -20%, #240046 0%, var(--bg-base) 80%); }
        body.mode-wrestling { background: radial-gradient(circle at 50% 50%, #370617 0%, var(--bg-base) 80%); }

        .sidebar {
            position: absolute; left: 20px; top: 20px; bottom: 20px; width: 340px;
            background: var(--panel-bg); padding: 25px; border-radius: 20px;
            border: 1px solid var(--glass-border); backdrop-filter: blur(25px);
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 0 1px rgba(255,255,255,0.05);
            z-index: 50; transition: transform 0.6s cubic-bezier(0.8, 0, 0.2, 1), opacity 0.4s;
        }
        
        .sidebar.hidden { transform: translateX(-120%); opacity: 0; pointer-events: none; }

        .main {
            flex: 1; position: relative; width: 100vw; height: 100vh;
            background: transparent; overflow: hidden;
        }

        h2.brand {
            font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 900;
            text-align: center; margin: 0; color: #fff;
            text-shadow: 0 0 20px var(--accent-cyan); letter-spacing: 2px;
        }

        label { font-size: 13px; color: #8b9bb4; font-weight: 700; letter-spacing: 1px; }
        
        textarea, input {
            width: 100%; background: rgba(0,0,0,0.4); color: white;
            border: 1px solid var(--glass-border); padding: 14px; border-radius: 12px;
            box-sizing: border-box; outline: none; font-size: 15px; font-weight: 500;
            transition: all 0.3s ease;
        }
        textarea:focus, input:focus { border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0,240,255,0.2); background: rgba(0,0,0,0.6); }

        .mode-selector { display: flex; gap: 8px; margin-bottom: 5px; }
        .mode-btn {
            flex: 1; padding: 12px 0; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
            color: #8b9bb4; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s;
        }
        .mode-btn.active { background: rgba(0, 240, 255, 0.15); border-color: var(--accent-cyan); color: #fff; text-shadow: 0 0 8px var(--accent-cyan); }

        button.action-btn {
            width: 100%; padding: 18px; cursor: pointer; border-radius: 12px; font-weight: 900;
            background: linear-gradient(135deg, rgba(0,240,255,0.1), rgba(0,240,255,0.25));
            color: var(--accent-cyan); border: 1px solid var(--accent-cyan);
            font-size: 18px; letter-spacing: 2px; font-family: 'Orbitron', sans-serif; transition: 0.3s;
            box-shadow: inset 0 0 10px rgba(0,240,255,0.2);
        }
        button.action-btn:hover { background: var(--accent-cyan); color: #000; box-shadow: 0 0 25px var(--accent-cyan); transform: translateY(-2px); }
        
        #poolDisplay { font-size: 20px; text-align: center; font-weight: 900; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px solid var(--glass-border); }

        .ingame-ui {
            position: absolute; right: 30px; top: 30px; display: flex; flex-direction: column; align-items: flex-end; gap: 15px; z-index: 10; opacity: 0; transition: opacity 0.5s; pointer-events: none;
        }
        .ingame-ui.visible { opacity: 1; }

        #gameTimer {
            font-family: 'Orbitron', sans-serif; font-size: 65px; color: #fff; font-weight: 900;
            text-shadow: 0 0 20px var(--accent-cyan), 0 0 40px var(--accent-cyan); line-height: 1;
        }
        .time-warning { color: var(--accent-magenta) !important; text-shadow: 0 0 20px var(--accent-magenta), 0 0 40px var(--accent-magenta) !important; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

        .legend-panel {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 15px; color: #ccc; font-size: 13px; font-weight: bold;
            display: flex; flex-direction: column; gap: 8px;
        }
        .legend-item { display: flex; align-items: center; gap: 10px; }
        .legend-icon { font-size: 20px; width: 30px; text-align: center; }

        canvas { display: block; width: 100%; height: 100%; }

        .modal {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(25px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
            opacity: 0; transition: opacity 0.5s ease;
        }
        .modal.show { display: flex; opacity: 1; }
        .modal h1 { font-family: 'Orbitron', sans-serif; color: var(--accent-gold); font-size: 6em; margin: 0 0 10px 0; text-shadow: 0 0 50px rgba(250, 204, 21, 0.6); }
        
        .winner-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;
            width: 80%; max-width: 1000px; max-height: 50vh; overflow-y: auto; margin: 30px 0; padding: 10px;
        }
        .winner-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.01));
            border: 1px solid rgba(250, 204, 21, 0.5); border-radius: 12px; padding: 15px; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .rank-badge { font-family: 'Orbitron', sans-serif; color: var(--accent-gold); font-size: 1.3em; font-weight: 900; margin-bottom: 5px; }
        .winner-name { font-size: 1.8em; font-weight: 900; color: white; }

        .shake-active { animation: shakeCam 0.2s infinite; }
        @keyframes shakeCam { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-4px, 4px); } 50% { transform: translate(4px, -4px); } }
    </style>
</head>
<body class="mode-racing">
    <div class="sidebar" id="controlPanel">
        <h2 class="brand">MX ESPORTS</h2>
        
        <label>1. 참가자 명단 (이름 점수)</label>
        <textarea id="nameInput" rows="7" placeholder="이범준10&#10;홍길동 3&#10;권나라"></textarea>
        <button type="button" class="action-btn" id="btnUpdateData" style="padding: 14px; font-size: 15px;">데이터 파싱</button>
        <div id="poolDisplay">0 명 대기중</div>
        
        <hr style="width:100%; border: 0; border-top: 1px solid var(--glass-border);">
        
        <label>2. 게임 모드</label>
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="racing">🏎️ 그랑프리</button>
            <button class="mode-btn" data-mode="pinball">🎯 마블드롭</button>
            <button class="mode-btn" data-mode="wrestling">🤼 로얄럼블</button>
        </div>

        <label>3. 라운드 세팅</label>
        <input type="text" id="prizeTitle" placeholder="상품명 입력">
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="number" id="prizeQty" value="1" min="1">
            <span style="font-size: 14px; color: #8b9bb4; font-weight: bold;">명 추출</span>
        </div>
        
        <button type="button" class="action-btn" id="btnStartGame" style="margin-top: 10px;">🚀 START GAME</button>
        <button type="button" class="action-btn" id="btnExportCSV" style="margin-top: auto; background: rgba(72,187,120,0.1); border-color: #48bb78; color: #48bb78; font-size: 14px;">결과 엑셀 다운로드</button>
    </div>

    <div class="main" id="gameContainer">
        <div class="ingame-ui" id="inGameUI">
            <div id="gameTimer">00:00</div>
            <div class="legend-panel" id="legendPanel">
                <div class="legend-item"><span class="legend-icon" id="lg-1">🚀</span> 10점 이상 (압도적)</div>
                <div class="legend-item"><span class="legend-icon" id="lg-2">🏎️</span> 6~9점 (강력)</div>
                <div class="legend-item"><span class="legend-icon" id="lg-3">🚗</span> 3~5점 (우세)</div>
                <div class="legend-item"><span class="legend-icon" id="lg-4">🏃</span> 그 외 (도전자)</div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="modal" id="resultModal">
        <h1>WINNERS</h1>
        <h2 id="modalPrizeTitle" style="font-size: 2.5em; margin:0; color: #fff;"></h2>
        <div class="winner-grid" id="winnerNames"></div>
        <button type="button" class="action-btn" id="btnCloseModal" style="width: auto; padding: 20px 60px; font-size: 20px;">당첨자 제외 및 복귀</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        const timerUI = document.getElementById('gameTimer');
        const inGameUI = document.getElementById('inGameUI');
        const sidebar = document.getElementById('controlPanel');
        const resultModal = document.getElementById('resultModal');
        
        let participants = [], finalWinners = [], entities = [], currentWinners = [], pegs = [];
        let animationId, gameActive = false, gameMode = 'racing';
        let startTime = 0, totalGameTimeMs = 0, suddenDeathTimeMs = 0;
        
        let camera = { x: 0, y: 0, targetX: 0, targetY: 0, scale: 1, targetScale: 1 };
        let worldWidth = 0, worldHeight = 0;
        let finishProcessed = false;

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                gameMode = this.getAttribute('data-mode');
                document.body.className = `mode-${gameMode}`;
                updateLegend();
            });
        });

        function updateLegend() {
            if (gameMode === 'wrestling') {
                document.getElementById('lg-1').innerText = '🦸‍♂️'; document.getElementById('lg-2').innerText = '🦹‍♂️';
                document.getElementById('lg-3').innerText = '🦍'; document.getElementById('lg-4').innerText = '🧍';
            } else {
                document.getElementById('lg-1').innerText = '🚀'; document.getElementById('lg-2').innerText = '🏎️';
                document.getElementById('lg-3').innerText = '🚗'; document.getElementById('lg-4').innerText = '🏃';
            }
        }

        function getAvatar(weight, mode) {
            if (mode === 'wrestling') {
                if (weight >= 10) return '🦸‍♂️'; if (weight >= 6) return '🦹‍♂️';
                if (weight >= 3) return '🦍'; return '🧍';
            } else {
                if (weight >= 10) return '🚀'; if (weight >= 6) return '🏎️';
                if (weight >= 4) return '🚗'; if (weight >= 2) return '🏃'; return '🐢';
            }
        }

        document.getElementById('btnUpdateData').addEventListener('click', function() {
            const lines = document.getElementById('nameInput').value.trim().split('\n');
            participants = [];
            lines.forEach((line, idx) => {
                const match = line.trim().match(/^([^\d]+)(?:[\s\|]*(\d+))?\s*$/);
                if (match && match[1]) {
                    participants.push({
                        id: 'p_' + idx, name: match[1].trim(), weight: match[2] ? parseInt(match[2], 10) : 1,
                        color: `hsl(${Math.random() * 360}, 80%, 60%)`
                    });
                }
            });
            document.getElementById('poolDisplay').innerText = `${participants.length} 명 대기중`;
        });

        function goFullscreen() { if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{}); }
        function exitFullscreen() { if (document.fullscreenElement) document.exitFullscreen().catch(()=>{}); }

        document.getElementById('btnStartGame').addEventListener('click', function() {
            const qty = parseInt(document.getElementById('prizeQty').value);
            const prize = document.getElementById('prizeTitle').value.trim();
            if (participants.length < qty) { alert("참가자가 부족합니다."); return; }
            if (!prize) { alert("상품명을 입력하세요."); return; }

            goFullscreen();
            sidebar.classList.add('hidden');
            inGameUI.classList.add('visible');
            setTimeout(resizeCanvas, 400); 

            // 시간 동기화 (최소 30초, 최대 120초)
            totalGameTimeMs = Math.max(30000, Math.min(120000, participants.length * 300));
            suddenDeathTimeMs = totalGameTimeMs - 10000;

            currentWinners = [];
            finishProcessed = false;
            initWorldAndEntities();
            startTime = Date.now();
            gameActive = true;
            
            cancelAnimationFrame(animationId);
            gameLoop(qty, prize);
        });

        function initWorldAndEntities() {
            camera = { x: 0, y: 0, targetX: 0, targetY: 0, scale: 1, targetScale: 1 };
            
            if (gameMode === 'racing') {
                worldWidth = canvas.width * 5; worldHeight = canvas.height;
                const trackH = worldHeight / participants.length;
                entities = participants.map((p, i) => ({
                    ...p, avatar: getAvatar(p.weight, 'racing'), x: 50, y: i * trackH + (trackH / 2),
                    progress: 0, status: 'normal', boostTimer: 0
                }));
            } 
            else if (gameMode === 'pinball') {
                worldWidth = canvas.width; worldHeight = canvas.height * 4;
                pegs = [];
                
                // 다이나믹 장애물 생성 (일반 Peg, 기어, 액티브 범퍼)
                for (let y = 300; y < worldHeight - 300; y += 120) {
                    for (let x = 50; x < worldWidth; x += 150) {
                        if (Math.random() > 0.4) {
                            pegs.push({ x: x + (Math.random()*60), y: y + (Math.random()*60), radius: 15, type: 'normal', flash: 0 });
                        }
                    }
                    // 중앙부 톱니바퀴 & 양옆 액티브 범퍼
                    pegs.push({ x: worldWidth/2, y: y + 60, radius: 40, type: 'gear', angle: 0 });
                    pegs.push({ x: worldWidth*0.2, y: y, radius: 25, type: 'bumper', flash: 0 });
                    pegs.push({ x: worldWidth*0.8, y: y, radius: 25, type: 'bumper', flash: 0 });
                }
                
                entities = participants.map((p, i) => ({
                    ...p, avatar: getAvatar(p.weight, 'racing'), x: (worldWidth / participants.length) * i, y: -Math.random()*600,
                    vx: (Math.random()-0.5)*5, vy: 0, radius: Math.max(10, Math.min(22, 400/participants.length))
                }));
            }
            else if (gameMode === 'wrestling') {
                worldWidth = canvas.width; worldHeight = canvas.height;
                entities = participants.map(p => ({
                    ...p, avatar: getAvatar(p.weight, 'wrestling'),
                    x: worldWidth/2 + (Math.random()-0.5)*150, y: worldHeight/2 + (Math.random()-0.5)*150,
                    vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                    radius: Math.max(16, Math.min(35, 500/participants.length)), eliminated: false
                }));
            }
        }

        function gameLoop(targetWinCount, prize) {
            if (!gameActive) return;
            const elapsed = Date.now() - startTime;
            const remaining = Math.max(0, Math.ceil((totalGameTimeMs - elapsed) / 1000));
            
            timerUI.innerText = `00:${remaining.toString().padStart(2, '0')}`;
            const isSuddenDeath = elapsed >= suddenDeathTimeMs;
            
            if (isSuddenDeath && !finishProcessed) timerUI.classList.add('time-warning');
            else timerUI.classList.remove('time-warning');

            // 타임오버 시 종료 프로세스 트리거 (렉 방지)
            if (elapsed >= totalGameTimeMs && gameMode !== 'wrestling' && !finishProcessed) {
                triggerFinish(targetWinCount, prize); 
            }

            // 카메라 스무딩 (결승선 렉 해결을 위해 타겟 추적 부드럽게)
            camera.x += (camera.targetX - camera.x) * 0.08;
            camera.y += (camera.targetY - camera.y) * 0.08;
            camera.scale += (camera.targetScale - camera.scale) * 0.05;

            ctx.fillStyle = gameMode === 'racing' ? '#0d1b2a' : gameMode === 'pinball' ? '#240046' : '#370617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.scale(camera.scale, camera.scale);
            ctx.translate(-canvas.width/2 - camera.x, -canvas.height/2 - camera.y);

            if (gameMode === 'racing') updateRacing(elapsed, isSuddenDeath, targetWinCount);
            else if (gameMode === 'pinball') updatePinball(elapsed, isSuddenDeath, targetWinCount);
            else if (gameMode === 'wrestling') updateWrestling(elapsed, isSuddenDeath, targetWinCount, prize);

            ctx.restore();

            animationId = requestAnimationFrame(() => gameLoop(targetWinCount, prize));
        }

        // 카메라를 멈추고 1.5초 딜레이 후 모달창을 띄우는 함수 (렉 해소 및 연출)
        function triggerFinish(targetWinCount, prize) {
            finishProcessed = true;
            document.getElementById('gameContainer').classList.remove('shake-active');
            timerUI.classList.remove('time-warning');
            
            // 부족한 승자 채우기
            if (currentWinners.length < targetWinCount) {
                let sorted = [];
                if (gameMode === 'racing') sorted = entities.filter(e => !e.finished).sort((a,b) => b.x - a.x);
                if (gameMode === 'pinball') sorted = entities.filter(e => !e.finished).sort((a,b) => b.y - a.y);
                currentWinners.push(...sorted.slice(0, targetWinCount - currentWinners.length));
            }

            // 1.5초 후 게임 루프 종료 및 결과창 표시
            setTimeout(() => {
                gameActive = false;
                cancelAnimationFrame(animationId);
                showResult(prize);
            }, 1500);
        }

        // --- 1. 레이싱 엔진 ---
        function updateRacing(elapsed, isSuddenDeath, targetWinCount) {
            const finishLineX = worldWidth - 200;
            ctx.fillStyle = '#facc15'; ctx.fillRect(finishLineX, 0, 20, worldHeight);
            
            let timeRatio = elapsed / totalGameTimeMs;
            let expectedX = timeRatio * finishLineX;
            let leadX = finishProcessed ? camera.targetX + canvas.width*0.3 : 0; // 종료 시 선두 고정
            
            entities.forEach(e => {
                if (e.finished) { renderEntity(e); return; }

                // 부스터 확률 극소화 (공정성). 단 가중치가 높을 때 효율 극대화
                if (e.boostTimer <= 0 && Math.random() < 0.002) {
                    e.status = 'boost'; e.boostTimer = 30 + Math.random() * 20;
                }

                let error = expectedX - e.x;
                // 가중치가 높을수록 기본 베이스 스피드 한계가 높음
                let baseSpeed = (error + (e.weight * 30)) * 0.012;

                if (e.status === 'boost') {
                    baseSpeed += (2 + e.weight * 0.8) * 4; // 가중치 높으면 빛의 속도
                    e.boostTimer--;
                    if(e.boostTimer <= 0) e.status = 'normal';
                }
                
                if (isSuddenDeath) baseSpeed += Math.random() * 15; 

                if (!finishProcessed) {
                    e.x += baseSpeed + (Math.random() * 2); 
                    if (e.x > leadX) leadX = e.x; 
                }

                if (e.x >= finishLineX) {
                    e.x = finishLineX; e.finished = true;
                    if (currentWinners.length < targetWinCount) currentWinners.push(e);
                }
                renderEntity(e);
            });

            if (!finishProcessed) {
                camera.targetX = leadX - canvas.width * 0.3;
                camera.targetScale = isSuddenDeath ? 1.4 : 1.1;
            }
        }

        // --- 2. 핀볼 엔진 (다이나믹 지형) ---
        function updatePinball(elapsed, isSuddenDeath, targetWinCount) {
            // 장애물 렌더링 및 로직
            pegs.forEach(p => { 
                if (p.type === 'gear') {
                    p.angle += 0.05; // 기어 회전
                    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
                    ctx.fillStyle = '#ff0055'; 
                    // 톱니바퀴 모양
                    for(let i=0; i<8; i++) { ctx.rotate(Math.PI/4); ctx.fillRect(-5, -p.radius-5, 10, p.radius+10); }
                    ctx.beginPath(); ctx.arc(0,0, p.radius, 0, Math.PI*2); ctx.fill();
                    ctx.restore();
                } else {
                    if (p.flash > 0) {
                        ctx.fillStyle = '#fff'; ctx.shadowBlur = 15; ctx.shadowColor = '#fff'; p.flash--;
                    } else {
                        ctx.fillStyle = p.type === 'bumper' ? '#facc15' : '#00f0ff'; ctx.shadowBlur = 0;
                    }
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
                }
            });

            const slotY = worldHeight - 150;
            ctx.fillStyle = 'rgba(250, 204, 21, 0.3)'; ctx.fillRect(0, slotY, worldWidth, 150);

            let timeRatio = elapsed / totalGameTimeMs;
            let expectedY = timeRatio * slotY;
            let lowestY = finishProcessed ? camera.targetY + canvas.height*0.4 : 0;

            entities.forEach(e => {
                if (e.finished) { renderEntity(e); return; }

                // 가중치가 높을수록 질량(중력)이 무거워져 돌파력이 좋음
                let gravity = 0.2 + (e.weight * 0.02);
                e.vy += isSuddenDeath ? gravity * 3 : gravity; 
                
                if (!finishProcessed) { e.x += e.vx; e.y += e.vy; }
                e.vx *= 0.98;

                if (e.x < e.radius || e.x > worldWidth - e.radius) { e.vx *= -0.9; e.x = Math.max(e.radius, Math.min(e.x, worldWidth - e.radius)); }

                // 다이나믹 장애물 충돌
                pegs.forEach(p => {
                    const dx = e.x - p.x; const dy = e.y - p.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < e.radius + p.radius) {
                        const angle = Math.atan2(dy, dx);
                        let bounce = 5;
                        if (p.type === 'bumper') { bounce = 15; p.flash = 10; } // 범퍼 맞으면 빛나고 강하게 튕김
                        if (p.type === 'gear') { bounce = 20; e.vx += (Math.random()-0.5)*10; }
                        
                        // 무거운 공은 덜 튕겨나가며 직진함
                        bounce -= (e.weight * 0.2); 
                        e.vx += Math.cos(angle) * Math.max(2, bounce); e.vy = Math.sin(angle) * Math.max(2, bounce);
                    }
                });

                // 유리천장 타임 게이트
                if (!isSuddenDeath && e.y > expectedY + 150) {
                    e.y = expectedY + 150; e.vy = -8 - Math.random() * 5; e.vx += (Math.random() - 0.5) * 10;
                }

                if (e.y > lowestY && !finishProcessed) lowestY = e.y;

                if (e.y > slotY) {
                    e.y = slotY; e.vy = 0; e.vx = 0; e.finished = true;
                    if (currentWinners.length < targetWinCount) currentWinners.push(e);
                }
                renderEntity(e);
            });

            if (!finishProcessed) {
                camera.targetY = lowestY - canvas.height * 0.4;
                camera.targetScale = isSuddenDeath ? 1.3 : 1.0;
            }
        }

        // --- 3. 로얄 럼블 ---
        function updateWrestling(elapsed, isSuddenDeath, targetWinCount, prize) {
            const cx = worldWidth / 2; const cy = worldHeight / 2;
            let timeRatio = elapsed / totalGameTimeMs;
            
            let ringRadius = Math.max(80, (Math.min(canvas.width, canvas.height)/2) * (1 - timeRatio * 0.8));
            
            ctx.beginPath(); ctx.arc(cx, cy, ringRadius, 0, Math.PI*2);
            ctx.strokeStyle = isSuddenDeath ? '#ff0055' : '#00f0ff'; ctx.lineWidth = 10; ctx.stroke();
            
            let alive = entities.filter(e => !e.eliminated);

            alive.forEach(e => {
                if (!finishProcessed) { e.x += e.vx; e.y += e.vy; }
                e.vx *= 0.93; e.vy *= 0.93;

                const dist = Math.hypot(e.x - cx, e.y - cy);
                if (dist > ringRadius) {
                    e.eliminated = true; 
                    if (entities.filter(en => !en.eliminated).length <= targetWinCount && !finishProcessed) {
                        currentWinners = entities.filter(en => !en.eliminated);
                        triggerFinish(targetWinCount, prize);
                    }
                } else {
                    e.vx += (cx - e.x) * 0.003; e.vy += (cy - e.y) * 0.003; 
                }

                alive.forEach(other => {
                    if (e !== other && Math.hypot(other.x - e.x, other.y - e.y) < e.radius + other.radius) {
                        const angle = Math.atan2(other.y - e.y, other.x - e.x);
                        // 가중치(파워) 기반 압도적 넉백
                        const force = (e.weight * 0.8) + Math.random() * 4; 
                        other.vx += Math.cos(angle) * force; other.vy += Math.sin(angle) * force;
                    }
                });
                renderEntity(e);
            });

            camera.targetX = 0; camera.targetY = 0;
            if (!finishProcessed) camera.targetScale = Math.min(2.5, 1 + (timeRatio * 1.5));

            if (elapsed >= totalGameTimeMs && !finishProcessed) {
                currentWinners = alive.slice(0, targetWinCount);
                triggerFinish(targetWinCount, prize);
            }
        }

        function renderEntity(e) {
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            if (gameMode === 'racing') {
                const fSize = Math.max(16, worldHeight / participants.length * 0.8);
                if(e.status === 'boost') { ctx.font = `${fSize*1.5}px Arial`; ctx.fillText('🔥', e.x-fSize, e.y); }
                ctx.font = `${fSize}px Arial`; ctx.fillText(e.avatar, e.x, e.y);
                ctx.font = `900 ${fSize*0.7}px "Noto Sans KR"`;
                ctx.fillStyle = e.finished ? '#facc15' : '#fff';
                ctx.textAlign = 'left'; ctx.fillText(e.name, e.x + fSize, e.y);
            } else if (gameMode === 'wrestling') {
                const fSize = e.radius * 1.5;
                ctx.font = `${fSize}px Arial`; ctx.fillText(e.avatar, e.x, e.y - 5);
                ctx.font = `900 ${Math.max(10, e.radius*0.6)}px "Noto Sans KR"`;
                ctx.fillStyle = '#fff'; ctx.fillText(e.name.substring(0,3), e.x, e.y + e.radius*0.8);
            } else {
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
                ctx.fillStyle = e.color; ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
                const fSize = Math.max(10, e.radius * 0.6);
                ctx.fillStyle = '#fff'; ctx.font = `900 ${fSize}px "Noto Sans KR"`;
                ctx.fillText(e.name.substring(0,3), e.x, e.y); 
            }
        }

        function showResult(prize) {
            inGameUI.classList.remove('visible');
            document.getElementById('modalPrizeTitle').innerText = `[ ${prize} ]`;
            
            document.getElementById('winnerNames').innerHTML = currentWinners.map((w, idx) => `
                <div class="winner-card">
                    <div class="rank-badge">${idx + 1}등</div>
                    <div class="winner-name">${w.name}</div>
                </div>
            `).join('');
            
            const modal = document.getElementById('resultModal');
            modal.classList.add('show');
        }

        document.getElementById('btnCloseModal').addEventListener('click', function() {
            currentWinners.forEach(w => finalWinners.push({ prize: document.getElementById('prizeTitle').value, name: w.name }));
            const winnerIds = currentWinners.map(w => w.id);
            participants = participants.filter(p => !winnerIds.includes(p.id));
            
            document.getElementById('poolDisplay').innerText = `${participants.length} 명 대기중`;
            document.getElementById('resultModal').classList.remove('show');
            document.getElementById('prizeTitle').value = ""; 
            
            sidebar.classList.remove('hidden');
            exitFullscreen();
            ctx.clearRect(0,0,canvas.width,canvas.height);
        });

        document.getElementById('btnExportCSV').addEventListener('click', function() {
            if (finalWinners.length === 0) { alert("저장할 데이터가 없습니다."); return; }
            let csv = "\uFEFF상품명,당첨자이름\n";
            finalWinners.forEach(row => { csv += `"${row.prize}","${row.name}"\n`; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'e스포츠_최종결과.csv'; a.click();
        });
    </script>
