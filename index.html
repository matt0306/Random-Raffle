<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>MX Division Extreme Raffle</title>
    <style>
        :root { --bg: #050510; --panel: #0d111a; --accent: #ff0055; --text: #fff; }
        body {
            margin: 0; padding: 20px; font-family: 'Malgun Gothic', sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; height: 100vh; gap: 20px; box-sizing: border-box; overflow: hidden;
        }
        .sidebar {
            width: 320px; background: var(--panel); padding: 20px;
            border-radius: 12px; border: 1px solid var(--accent);
            display: flex; flex-direction: column; gap: 15px; box-shadow: 0 0 20px rgba(255,0,85,0.2);
            z-index: 10; flex-shrink: 0;
        }
        .main {
            flex: 1; background: #000; border-radius: 12px;
            display: flex; flex-direction: column; position: relative;
            border: 2px solid #333; box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        textarea, input {
            width: 100%; background: #050510; color: white; border: 1px solid #333;
            padding: 10px; border-radius: 6px; box-sizing: border-box; outline: none;
        }
        textarea:focus, input:focus { border-color: var(--accent); }
        button {
            width: 100%; padding: 15px; cursor: pointer; border-radius: 6px; font-weight: bold;
            background: transparent; color: var(--accent); border: 2px solid var(--accent);
            transition: 0.2s; font-size: 16px; text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover:not(:disabled) { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
        button:disabled { border-color: #333; color: #555; cursor: not-allowed; }
       
        #poolDisplay { font-size: 24px; color: var(--accent); font-weight: bold; text-align: center; }
       
        /* 레이싱 캔버스 영역 */
        canvas { display: block; width: 100%; height: 100%; }
       
        /* 화면 진동 효과 (부스터 발동 시) */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-active { animation: shake 0.5s; }

        .modal {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .modal h1 { color: #facc15; font-size: 4em; margin: 0 0 20px 0; text-shadow: 0 0 30px #facc15; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--accent); margin: 0; text-align: center; font-style: italic;">EXTREME RAFFLE</h2>
       
        <label style="font-size: 12px; color: #aaa;">1. 명단 & 가중치 입력 (이름 띄우고 점수)</label>
        <textarea id="nameInput" rows="7" placeholder="이범준 10&#10;홍길동 3&#10;권나라 1"></textarea>
        <button type="button" id="btnUpdateData">데이터 등록</button>
        <div id="poolDisplay">0 명 대기중</div>
       
        <hr style="width:100%; border: 0; border-top: 1px solid #333;">
       
        <label style="font-size: 12px; color: #aaa;">2. 이번 라운드 설정</label>
        <input type="text" id="prizeTitle" placeholder="상품명 (예: 에어팟 프로)">
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="number" id="prizeQty" value="1" min="1">
            <span style="font-size: 14px; white-space: nowrap;">명 뽑기</span>
        </div>
       
        <button type="button" id="btnStartRace" style="margin-top: 20px; border-color: #00ffcc; color: #00ffcc;">🏁 그랑프리 시작</button>
        <button type="button" id="btnExportCSV" style="margin-top: auto; border-color: #48bb78; color: #48bb78;">최종 결과 엑셀 저장</button>
    </div>

    <div class="main" id="gameContainer">
        <canvas id="raceCanvas"></canvas>
    </div>

    <div class="modal" id="resultModal">
        <h1>WINNER!</h1>
        <h2 id="modalPrizeTitle" style="color: #00ffcc; font-size: 2em; margin-bottom: 20px;"></h2>
        <div id="winnerNames" style="font-size: 2em; margin-bottom: 40px; text-align: center; color: white; max-height: 40vh; overflow-y: auto;"></div>
        <button type="button" id="btnCloseModal" style="width: auto; padding: 15px 50px; font-size: 18px; background: var(--accent); color: white; border: none;">당첨자 제외하고 확인</button>
    </div>

    <script>
        const canvas = document.getElementById('raceCanvas');
        const ctx = canvas.getContext('2d');
        let animationId;
       
        let participants = [];
        let finalWinners = [];
        let currentWinners = [];
        let runners = [];
       
        // 캔버스 사이즈 자동 맞춤
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 아바타 결정 로직 (가중치에 따라 다름)
        function getAvatar(weight) {
            if (weight >= 10) return '🚀';
            if (weight >= 6) return '🏎️';
            if (weight >= 4) return '🚗';
            if (weight >= 2) return '🏃';
            return '🐢';
        }

        // 1. 데이터 파싱
        document.getElementById('btnUpdateData').addEventListener('click', function() {
            const raw = document.getElementById('nameInput').value.trim();
            if (!raw) return;
           
            const lines = raw.split('\n');
            participants = [];
           
            lines.forEach((line, idx) => {
                const match = line.trim().match(/^(.*?)(?:(?:\||\t|\s)+(\d+))?\s*$/);
                if (match && match[1]) {
                    const name = match[1].trim();
                    const weight = match[2] ? parseInt(match[2], 10) : 1;
                    participants.push({
                        id: 'p_' + idx + '_' + Date.now(),
                        name: name,
                        weight: weight,
                        avatar: getAvatar(weight)
                    });
                }
            });
           
            document.getElementById('poolDisplay').innerText = `${participants.length} 명 대기중`;
            drawIdleScreen(); // 대기 화면 렌더링
        });

        function drawIdleScreen() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#333';
            ctx.font = '30px "Malgun Gothic"';
            ctx.textAlign = 'center';
            ctx.fillText("데이터를 등록하고 그랑프리를 시작하세요.", canvas.width/2, canvas.height/2);
        }
        drawIdleScreen();

        // 2. 레이싱 게임 엔진 시작
        document.getElementById('btnStartRace').addEventListener('click', function() {
            const qty = parseInt(document.getElementById('prizeQty').value);
            const prize = document.getElementById('prizeTitle').value.trim();
           
            if (participants.length < qty) { alert("참가자가 부족합니다."); return; }
            if (!prize) { alert("상품명을 입력하세요."); return; }

            this.disabled = true;
            document.getElementById('resultModal').style.display = 'none';

            // 참가자들을 러너 객체로 변환
            const trackHeight = canvas.height / participants.length;
            runners = participants.map((p, i) => {
                return {
                    ...p,
                    y: i * trackHeight + (trackHeight / 2),
                    x: 50,
                    progress: 0, // 0 to 100
                    speed: (Math.random() * 0.05) + (p.weight * 0.015), // 가중치 높을수록 기본 속도 빠름
                    status: 'normal', // normal, boost, stun
                    statusTimer: 0,
                    finished: false
                };
            });
           
            currentWinners = [];
            startAnimationLoop(qty, prize);
        });

        // 애니메이션 루프
        function startAnimationLoop(targetWinCount, prize) {
            cancelAnimationFrame(animationId);
            const finishLineX = canvas.width - 100;
           
            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
               
                // 배경 그리기 (우주/사이버펑크 느낌의 격자)
                ctx.strokeStyle = '#111';
                ctx.lineWidth = 1;
                for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
               
                // 결승선 그리기
                ctx.fillStyle = '#facc15';
                ctx.fillRect(finishLineX, 0, 10, canvas.height);
                ctx.fillStyle = '#000';
                for(let i=0; i<canvas.height; i+=20) { ctx.fillRect(finishLineX, i, 10, 10); } // 체크무늬

                let activeRacers = 0;

                runners.forEach(r => {
                    // 아이템 기믹 연출 (매 프레임 낮은 확률로 발동)
                    if (r.status === 'normal' && !r.finished) {
                        const chance = Math.random();
                        if (chance < 0.001) { // 부스터 발동
                            r.status = 'boost';
                            r.statusTimer = 60; // 약 1초 지속
                            document.getElementById('gameContainer').classList.add('shake-active');
                            setTimeout(() => document.getElementById('gameContainer').classList.remove('shake-active'), 500);
                        } else if (chance < 0.0005 && r.progress > 20) { // 지뢰 밟음 (스턴)
                            r.status = 'stun';
                            r.statusTimer = 60;
                        }
                    }

                    // 상태에 따른 속도 계산
                    let currentSpeed = r.speed;
                    if (r.status === 'boost') { currentSpeed *= 4; r.statusTimer--; if(r.statusTimer<=0) r.status='normal'; }
                    if (r.status === 'stun') { currentSpeed = 0; r.statusTimer--; if(r.statusTimer<=0) r.status='normal'; }

                    if (!r.finished) {
                        // 피말리는 연출을 위해 뒤쳐진 사람에게 보정치(고무줄 효과) 부여
                        const maxProgress = Math.max(...runners.map(ru => ru.progress));
                        if (r.progress < maxProgress - 20) currentSpeed += 0.05;

                        r.progress += currentSpeed;
                        r.x = 50 + (r.progress / 100) * (finishLineX - 50);
                        activeRacers++;

                        // 결승선 통과 체크
                        if (r.x >= finishLineX) {
                            r.x = finishLineX;
                            r.finished = true;
                            if (currentWinners.length < targetWinCount) {
                                currentWinners.push(r);
                            }
                        }
                    }

                    // 러너 그리기
                    const fontSize = Math.max(16, Math.min(30, canvas.height / runners.length));
                    ctx.font = `${fontSize}px Arial`;
                    ctx.textAlign = 'right';
                   
                    // 아이템 효과 그리기
                    if (r.status === 'boost') { ctx.fillText('🔥', r.x - 20, r.y + 8); }
                    if (r.status === 'stun') { ctx.fillText('💥', r.x, r.y + 8); }
                   
                    // 아바타 및 이름
                    ctx.fillText(r.avatar, r.x, r.y + (fontSize/3));
                   
                    ctx.font = `bold ${fontSize*0.6}px "Malgun Gothic"`;
                    ctx.fillStyle = r.finished ? '#facc15' : '#fff';
                    ctx.textAlign = 'left';
                    ctx.fillText(r.name, r.x + 10, r.y + (fontSize/4));
                });

                // 게임 종료 체크
                if (currentWinners.length >= targetWinCount) {
                    // 모두 멈추고 결과 모달 띄우기
                    setTimeout(() => showResult(prize), 1000);
                    return; // 루프 종료
                }

                animationId = requestAnimationFrame(render);
            }
            render();
        }

        // 3. 결과 처리 및 당첨자 제외
        function showResult(prize) {
            document.getElementById('modalPrizeTitle').innerText = `[ ${prize} ]`;
            document.getElementById('winnerNames').innerHTML = currentWinners.map((w, idx) => `<div><span style="color:#facc15; font-size:0.8em;">${idx+1}위</span> ${w.avatar} ${w.name}</div>`).join('');
            document.getElementById('resultModal').style.display = 'flex';
            document.getElementById('btnStartRace').disabled = false;
        }

        document.getElementById('btnCloseModal').addEventListener('click', function() {
            // 당첨자를 최종 명단에 추가
            currentWinners.forEach(w => finalWinners.push({ prize: document.getElementById('prizeTitle').value, name: w.name }));
           
            // 기존 참가자 풀에서 영구 제외
            const winnerIds = currentWinners.map(w => w.id);
            participants = participants.filter(p => !winnerIds.includes(p.id));
           
            document.getElementById('poolDisplay').innerText = `${participants.length} 명 대기중`;
            document.getElementById('resultModal').style.display = 'none';
            document.getElementById('prizeTitle').value = ""; // 상품명 초기화
           
            drawIdleScreen();
        });

        // 4. CSV 저장
        document.getElementById('btnExportCSV').addEventListener('click', function() {
            if (finalWinners.length === 0) { alert("저장할 데이터가 없습니다."); return; }
            let csv = "\uFEFF상품명,당첨자이름\n";
            finalWinners.forEach(row => { csv += `"${row.prize}","${row.name}"\n`; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = '그랑프리_최종결과.csv'; a.click();
        });
    </script>
</body>
</html>
